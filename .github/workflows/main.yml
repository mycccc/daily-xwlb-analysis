name: 每日新闻联播分析

on:
  schedule:
    # 北京时间每天20:00（UTC 12:00）
    # - cron: '0 12 * * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  analyze-xwlb:
    runs-on: ubuntu-latest

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 配置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖（强制锁定兼容版本）
        run: |
          python -m pip install --upgrade pip
          pip install --force-reinstall --no-cache-dir \
              requests==2.31.0 \
              beautifulsoup4==4.12.2 \
              openai==1.55.0 \
              httpx==0.27.2 \
              python-dotenv==1.0.0 \
              markdown==3.6

      - name: 运行分析脚本
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python main.py

      - name: 提交生成的文件
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          if [ -d "output" ]; then git add output/; fi
          if [ -d "docs" ]; then git add docs/; fi
          git commit -m "📊 自动生成 $(date +%Y-%m-%d) 新闻联播分析报告" || echo "无变更"
          git push
